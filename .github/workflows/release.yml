name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev pkg-config libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev libclang-dev
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build binaries
        run: cargo build --release
      
      - name: Strip binaries
        run: |
          strip target/release/zeditor
          strip target/release/channel-surfer
      
      - name: Package binaries
        run: |
          mkdir -p artifacts
          cp target/release/zeditor artifacts/zeditor-linux-x86_64
          cp target/release/channel-surfer artifacts/channel-surfer-linux-x86_64
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: artifacts/*

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      
      - name: Build binaries
        run: cross build --release --target aarch64-unknown-linux-gnu
      
      - name: Package binaries
        run: |
          mkdir -p artifacts
          cp target/aarch64-unknown-linux-gnu/release/zeditor artifacts/zeditor-linux-arm64
          cp target/aarch64-unknown-linux-gnu/release/channel-surfer artifacts/channel-surfer-linux-arm64
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-binaries
          path: artifacts/*

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: |
          brew install ffmpeg@7 sdl2 pkg-config
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      
      - name: Build binaries
        run: |
          export PKG_CONFIG_PATH="/usr/local/opt/ffmpeg@7/lib/pkgconfig"
          cargo build --release
      
      - name: Strip binaries
        run: |
          strip target/release/zeditor
          strip target/release/channel-surfer
      
      - name: Package binaries
        run: |
          mkdir -p artifacts
          cp target/release/zeditor artifacts/zeditor-macos-x86_64
          cp target/release/channel-surfer artifacts/channel-surfer-macos-x86_64
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-binaries
          path: artifacts/*

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: |
          brew install ffmpeg@7 sdl2 pkg-config
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      
      - name: Build binaries
        run: |
          export PKG_CONFIG_PATH="/opt/homebrew/opt/ffmpeg@7/lib/pkgconfig"
          cargo build --release
      
      - name: Strip binaries
        run: |
          strip target/release/zeditor
          strip target/release/channel-surfer
      
      - name: Package binaries
        run: |
          mkdir -p artifacts
          cp target/release/zeditor artifacts/zeditor-macos-arm64
          cp target/release/channel-surfer artifacts/channel-surfer-macos-arm64
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-binaries
          path: artifacts/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: |
          vcpkg install ffmpeg sdl2 --triplet x64-windows-static
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set environment for vcpkg
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\lib\pkgconfig" >> $env:GITHUB_ENV
      
      - name: Build binaries
        run: cargo build --release
      
      - name: Package binaries
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item target/release/zeditor.exe artifacts/zeditor-windows-x86_64.exe
          Copy-Item target/release/channel-surfer.exe artifacts/channel-surfer-windows-x86_64.exe
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: artifacts/*

  create-release:
    needs: [build-linux, build-linux-arm64, build-macos-x86_64, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*-binaries"
          merge-multiple: true
      
      - name: Display artifacts
        run: ls -la artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

stages:
  - test
  - lint
  - release

variables:
  CARGO_TERM_COLOR: always
  GIT_SUBMODULE_STRATEGY: recursive

# Cache cargo dependencies between jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - target/
    - .cargo/

# Linux x86_64 test (runs on ubuntu runner)
test-linux:
  stage: test
  image: ubuntu:24.04
  before_script:
    - apt-get update && apt-get install -y curl build-essential libsdl2-dev pkg-config libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev libclang-dev git
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
  script:
    - cargo build
    - cargo test
  tags:
    - ubuntu

# macOS Apple Silicon test (runs on macos runner)
test-macos:
  stage: test
  tags:
    - macos
  before_script:
    - brew install ffmpeg@7 sdl2 pkg-config || true
  script:
    - export PKG_CONFIG_PATH="/opt/homebrew/opt/ffmpeg@7/libpkgconfig:/opt/homebrew/opt/sdl2/lib/pkgconfig"
    - cargo build
    - cargo test

# Lint checks (runs on ubuntu runner)
lint:
  stage: lint
  image: ubuntu:24.04
  before_script:
    - apt-get update && apt-get install -y curl build-essential libsdl2-dev pkg-config libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev libclang-dev git
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - rustup component add rustfmt clippy
  script:
    - cargo fmt -- --check
    - cargo clippy -- -D warnings
  tags:
    - ubuntu

# Release builds (only run on version tags like v1.0.0)
release-linux:
  stage: release
  image: ubuntu:24.04
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\./
  before_script:
    - apt-get update && apt-get install -y curl build-essential libsdl2-dev pkg-config libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev libclang-dev git
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
  script:
    - cargo build --release
    - strip target/release/zeditor
    - strip target/release/channel-surfer
  artifacts:
    name: "zeditor-$CI_COMMIT_TAG-linux"
    paths:
      - target/release/zeditor
      - target/release/channel-surfer
    expire_in: 30 days
  tags:
    - ubuntu

release-macos:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\./
  tags:
    - macos
  before_script:
    - brew install ffmpeg@7 sdl2 pkg-config || true
  script:
    - export PKG_CONFIG_PATH="/opt/homebrew/opt/ffmpeg@7/lib/pkgconfig:/opt/homebrew/opt/sdl2/lib/pkgconfig"
    - cargo build --release
  artifacts:
    name: "zeditor-$CI_COMMIT_TAG-macos"
    paths:
      - target/release/zeditor
      - target/release/channel-surfer
    expire_in: 30 days
